<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PÁDELTRACK - Registra cada jugada</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Outfit', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0a0f1a;
            color: #f1f5f9;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect, useRef, useCallback } = React;

        const SHOT_TYPES = [
            { id: "S1", label: "S1", group: "Saque" },
            { id: "S2", label: "S2", group: "Saque" },
            { id: "D", label: "D", group: "Fondo" },
            { id: "DP", label: "D P", group: "Fondo" },
            { id: "R", label: "R", group: "Fondo" },
            { id: "RP", label: "R P", group: "Fondo" },
            { id: "GloD", label: "Glo D", group: "Globo" },
            { id: "GloDP", label: "Glo DP", group: "Globo" },
            { id: "GloR", label: "Glo R", group: "Globo" },
            { id: "GloRP", label: "Glo RP", group: "Globo" },
            { id: "VolD", label: "Vol D", group: "Red" },
            { id: "VolR", label: "Vol R", group: "Red" },
            { id: "Sm", label: "Sm", group: "Remate" },
            { id: "Smx3", label: "Sm x3", group: "Remate" },
            { id: "Smx4", label: "Sm x4", group: "Remate" },
            { id: "BajPD", label: "Baj PD", group: "Especial" },
            { id: "BajPR", label: "Baj PR", group: "Especial" },
            { id: "VibBand", label: "Vib/Band", group: "Especial" },
            { id: "Rulo", label: "Rulo", group: "Especial" },
        ];

        const RESULTS = [
            { id: "ErrNF", label: "Err NF", type: "error", color: "#ef4444" },
            { id: "Win", label: "Win", type: "winner", color: "#22c55e" },
            { id: "ErrF", label: "Err F", type: "forced", color: "#f97316" },
            { id: "FzaErr", label: "Fza Err", type: "forced", color: "#f97316" },
        ];

        const SCORE_SEQ = ["0", "15", "30", "40"];
        function nextScore(c) {
            const i = SCORE_SEQ.indexOf(c);
            return i < SCORE_SEQ.length - 1 ? SCORE_SEQ[i + 1] : c;
        }

        const SHOT_GROUPS = [...new Set(SHOT_TYPES.map(s => s.group))];

        function ResultBadge({ result }) {
            const r = RESULTS.find(x => x.id === result);
            if (!r) return null;
            return (
                <span style={{
                    padding: "2px 10px", borderRadius: 20, fontSize: 11, fontWeight: 700,
                    background: r.color + "22", color: r.color, border: `1px solid ${r.color}44`
                }}>
                    {r.label}
                </span>
            );
        }

        function ShotBadge({ shot }) {
            return (
                <span style={{
                    padding: "2px 8px", borderRadius: 4, fontSize: 11, fontWeight: 700,
                    background: "rgba(99,179,237,0.15)", color: "#63b3ed", border: "1px solid rgba(99,179,237,0.3)"
                }}>
                    {shot}
                </span>
            );
        }

        function SetupScreen({ onStart }) {
            const [t1p1, setT1p1] = useState("Ugo");
            const [t1p2, setT1p2] = useState("Marco");
            const [t2p1, setT2p1] = useState("Haymar");
            const [t2p2, setT2p2] = useState("Herni");
            const [serving, setServing] = useState("t1p1");
            const [sets, setSets] = useState("2");
            const [deuceRule, setDeuceRule] = useState("advantage");

            const ready = t1p1 && t1p2 && t2p1 && t2p2;
            const inp = {
                width: "100%", background: "rgba(255,255,255,0.06)", border: "1px solid rgba(255,255,255,0.12)",
                borderRadius: 8, padding: "10px 14px", color: "#f1f5f9", fontSize: 14, outline: "none",
                fontFamily: "inherit", boxSizing: "border-box"
            };

            return (
                <div style={{
                    minHeight: "100vh", background: "#0a0f1a", display: "flex", alignItems: "center",
                    justifyContent: "center", fontFamily: "'Outfit', sans-serif", padding: 20
                }}>
                    <div style={{ width: "100%", maxWidth: 580 }}>
                        <div style={{ textAlign: "center", marginBottom: 48 }}>
                            <div style={{ display: "inline-flex", alignItems: "center", gap: 10, marginBottom: 12 }}>
                                <div style={{
                                    width: 44, height: 44, borderRadius: "50%", background: "linear-gradient(135deg, #f59e0b, #ef4444)",
                                    display: "flex", alignItems: "center", justifyContent: "center", fontSize: 22
                                }}>
                                    🎾
                                </div>
                                <span style={{ fontSize: 28, fontWeight: 900, color: "#f1f5f9", letterSpacing: "-0.03em" }}>
                                    PÁDEL<span style={{ color: "#f59e0b" }}>TRACK</span>
                                </span>
                            </div>
                            <p style={{ color: "#64748b", fontSize: 14, margin: 0 }}>Registra cada jugada. Analiza cada partido.</p>
                        </div>
                        <div style={{
                            background: "rgba(255,255,255,0.04)", border: "1px solid rgba(255,255,255,0.08)",
                            borderRadius: 16, padding: 32
                        }}>
                            <p style={{
                                color: "#94a3b8", fontSize: 12, fontWeight: 700, letterSpacing: "0.1em",
                                marginBottom: 28, marginTop: 0
                            }}>
                                CONFIGURAR PARTIDO
                            </p>

                            <div style={{ marginBottom: 28 }}>
                                <p style={{
                                    color: "#94a3b8", fontSize: 11, fontWeight: 700, letterSpacing: "0.08em",
                                    marginBottom: 12, marginTop: 0
                                }}>
                                    JUGADORES
                                </p>
                                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 24 }}>
                                    <div>
                                        <p style={{
                                            color: "#f59e0b", fontSize: 10, fontWeight: 700, letterSpacing: "0.08em",
                                            marginBottom: 10, marginTop: 0
                                        }}>
                                            EQUIPO 1
                                        </p>
                                        <input style={{ ...inp, marginBottom: 10 }} placeholder="Jugador 1" value={t1p1} onChange={e => setT1p1(e.target.value)} />
                                        <input style={inp} placeholder="Jugador 2" value={t1p2} onChange={e => setT1p2(e.target.value)} />
                                    </div>
                                    <div>
                                        <p style={{
                                            color: "#63b3ed", fontSize: 10, fontWeight: 700, letterSpacing: "0.08em",
                                            marginBottom: 10, marginTop: 0
                                        }}>
                                            EQUIPO 2
                                        </p>
                                        <input style={{ ...inp, marginBottom: 10 }} placeholder="Jugador 3" value={t2p1} onChange={e => setT2p1(e.target.value)} />
                                        <input style={inp} placeholder="Jugador 4" value={t2p2} onChange={e => setT2p2(e.target.value)} />
                                    </div>
                                </div>
                            </div>

                            <div style={{ marginBottom: 28 }}>
                                <p style={{
                                    color: "#94a3b8", fontSize: 11, fontWeight: 700, letterSpacing: "0.08em",
                                    marginBottom: 12, marginTop: 0
                                }}>
                                    SACA PRIMERO
                                </p>
                                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr 1fr", gap: 8 }}>
                                    {[
                                        { id: "t1p1", label: t1p1 || "Jug 1" },
                                        { id: "t1p2", label: t1p2 || "Jug 2" },
                                        { id: "t2p1", label: t2p1 || "Jug 3" },
                                        { id: "t2p2", label: t2p2 || "Jug 4" }
                                    ].map(opt => (
                                        <button key={opt.id} onClick={() => setServing(opt.id)} style={{
                                            padding: "10px 8px", borderRadius: 8, border: "1px solid",
                                            borderColor: serving === opt.id ? "#f59e0b" : "rgba(255,255,255,0.1)",
                                            background: serving === opt.id ? "rgba(245,158,11,0.15)" : "transparent",
                                            color: serving === opt.id ? "#f59e0b" : "#94a3b8",
                                            fontSize: 12, fontWeight: 700, cursor: "pointer", fontFamily: "inherit", textAlign: "center"
                                        }}>
                                            {opt.label}
                                        </button>
                                    ))}
                                </div>
                            </div>

                            <div style={{ marginBottom: 28 }}>
                                <p style={{
                                    color: "#94a3b8", fontSize: 11, fontWeight: 700, letterSpacing: "0.08em",
                                    marginBottom: 12, marginTop: 0
                                }}>
                                    NÚMERO DE SETS
                                </p>
                                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8 }}>
                                    {["1", "3"].map(n => (
                                        <button key={n} onClick={() => setSets(n)} style={{
                                            padding: "12px", borderRadius: 8, border: "1px solid",
                                            borderColor: sets === n ? "#63b3ed" : "rgba(255,255,255,0.1)",
                                            background: sets === n ? "rgba(99,179,237,0.15)" : "transparent",
                                            color: sets === n ? "#63b3ed" : "#94a3b8",
                                            fontSize: 13, fontWeight: 700, cursor: "pointer", fontFamily: "inherit"
                                        }}>
                                            {n} Set{n !== "1" ? "s" : ""}
                                        </button>
                                    ))}
                                </div>
                            </div>

                            <div style={{ marginBottom: 28 }}>
                                <p style={{
                                    color: "#94a3b8", fontSize: 11, fontWeight: 700, letterSpacing: "0.08em",
                                    marginBottom: 12, marginTop: 0
                                }}>
                                    REGLA EN 40-40
                                </p>
                                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8 }}>
                                    {[
                                        { id: "goldenPoint", label: "Golden Point" },
                                        { id: "advantage", label: "Advantage" }
                                    ].map(opt => (
                                        <button key={opt.id} onClick={() => setDeuceRule(opt.id)} style={{
                                            padding: "12px", borderRadius: 8, border: "1px solid",
                                            borderColor: deuceRule === opt.id ? "#22c55e" : "rgba(255,255,255,0.1)",
                                            background: deuceRule === opt.id ? "rgba(34,197,94,0.15)" : "transparent",
                                            color: deuceRule === opt.id ? "#22c55e" : "#94a3b8",
                                            fontSize: 12, fontWeight: 700, cursor: "pointer", fontFamily: "inherit", textAlign: "center"
                                        }}>
                                            {opt.label}
                                        </button>
                                    ))}
                                </div>
                            </div>

                            <button disabled={!ready} onClick={() => onStart({ t1p1, t1p2, t2p1, t2p2, serving, sets: parseInt(sets), deuceRule })} style={{
                                width: "100%", padding: "14px", borderRadius: 10, border: "none",
                                background: ready ? "linear-gradient(135deg, #f59e0b, #ef4444)" : "rgba(255,255,255,0.05)",
                                color: ready ? "#0a0f1a" : "#475569",
                                fontSize: 15, fontWeight: 800, cursor: ready ? "pointer" : "not-allowed",
                                letterSpacing: "0.05em", fontFamily: "inherit"
                            }}>
                                INICIAR PARTIDO →
                            </button>
                        </div>
                    </div>
                </div>
            );
        }

        function TrackerScreen({ config, events, onAddEvent, onUndo, onDeleteEvent, onFinish, onSetupBack }) {
            const [selPlayer, setSelPlayer] = useState(null);
            const [selShot, setSelShot] = useState(null);
            const [selResult, setSelResult] = useState(null);
            const [selVictim, setSelVictim] = useState(null);
            const [selVictimShot, setSelVictimShot] = useState(null);
            const [errorMessage, setErrorMessage] = useState(null);
            const [showHistory, setShowHistory] = useState(false);
            const [serveFirstPlayers, setServeFirstPlayers] = useState({
                t1: config.serving.startsWith("t1") ? config.serving : null,
                t2: null
            });
            const [serveSecondPlayers, setServeSecondPlayers] = useState({ t1: null, t2: null });
            const [secondServer, setSecondServer] = useState(null);
            const [pendingServeChoice, setPendingServeChoice] = useState(null);
            const [scoreModifiers, setScoreModifiers] = useState({
                points: { t1: 0, t2: 0 },
                games: { t1: 0, t2: 0 },
                sets: { t1: 0, t2: 0 }
            });
            const [tiebreakNotification, setTiebreakNotification] = useState(false);
            const [prevGamesState, setPrevGamesState] = useState({ t1: 0, t2: 0 });
            const [serverSequence, setServerSequence] = useState(null);
            const [setWinner, setSetWinner] = useState(null);
            const [matchWinner, setMatchWinner] = useState(null);

            const players = useMemo(() => [
                { id: "t1p1", name: config.t1p1, team: "t1", color: "#f59e0b" },
                { id: "t1p2", name: config.t1p2, team: "t1", color: "#f59e0b" },
                { id: "t2p1", name: config.t2p1, team: "t2", color: "#63b3ed" },
                { id: "t2p2", name: config.t2p2, team: "t2", color: "#63b3ed" },
            ], [config.t1p1, config.t1p2, config.t2p1, config.t2p2]);

            const getServerForGame = useCallback((gameNumber) => {
                if (!secondServer) return config.serving;
                
                const firstServer = config.serving;
                const firstServerPlayer = players.find(p => p.id === firstServer);
                const secondServerPlayer = players.find(p => p.id === secondServer);
                
                if (!firstServerPlayer || !secondServerPlayer) return firstServer;
                
                const firstServerTeam = firstServerPlayer.team;
                const secondServerTeam = secondServerPlayer.team;
                
                const firstServerPartner = players.find(p => p.team === firstServerTeam && p.id !== firstServer);
                const secondServerPartner = players.find(p => p.team === secondServerTeam && p.id !== secondServer);
                
                if (!firstServerPartner || !secondServerPartner) return firstServer;
                
                const sequence = [firstServer, secondServer, firstServerPartner.id, secondServerPartner.id];
                const index = (gameNumber - 1) % 4;
                return sequence[index];
            }, [config.serving, secondServer, players]);

            const currentPlayer = players.find(p => p.id === selPlayer);
            const resultObj = RESULTS.find(r => r.id === selResult);
            const isForced = resultObj?.type === "forced";
            const canRegister = selPlayer && selShot && selResult && (!isForced || (selVictim && selVictimShot));

            useEffect(() => {
                if (canRegister && selResult) {
                    const timer = setTimeout(() => {
                        handleRegister();
                    }, 50);
                    return () => clearTimeout(timer);
                }
            }, [selResult, canRegister]);

            function handleRegister() {
                if (!canRegister) return;
                
                const shotObj = SHOT_TYPES.find(s => s.id === selShot);
                const isServeShot = shotObj?.group === "Saque";
                const isWinOrErrNF = selResult === "Win" || selResult === "ErrNF";
                const currentServerName = players.find(p => p.id === currentServer)?.name;
                
                if (isServeShot && isWinOrErrNF && selPlayer !== currentServer) {
                    setErrorMessage(`⚠️ Solo el jugador que está sirviendo puede ganar o cometer error en el servicio.\n\nActualmente está sirviendo: ${currentServerName}`);
                    return;
                }
                
                const victimShotObj = selVictimShot ? SHOT_TYPES.find(s => s.id === selVictimShot) : null;
                onAddEvent({
                    player: selPlayer, playerName: currentPlayer.name, team: currentPlayer.team,
                    shot: selShot, shotLabel: shotObj?.label,
                    result: selResult, resultLabel: resultObj?.label, resultType: resultObj?.type,
                    victim: isForced ? selVictim : null,
                    victimName: isForced ? players.find(p => p.id === selVictim)?.name : null,
                    victimShot: isForced ? selVictimShot : null,
                    victimShotLabel: isForced ? victimShotObj?.label : null,
                    isServe: shotObj?.group === "Saque",
                });
                setSelShot(null);
                setSelResult(null);
                setSelVictim(null);
                setSelVictimShot(null);
            }

            useEffect(() => {
                setScoreModifiers(prev => ({
                    points: { t1: 0, t2: 0 },
                    games: prev.games,
                    sets: { t1: 0, t2: 0 }
                }));
            }, [events.length]);

            const lastServersFromEvents = useMemo(() => {
                const last = { t1: config.serving, t2: null };
                events.forEach(ev => {
                    if (ev.isServe) {
                        last[ev.team] = ev.player;
                    }
                });
                return last;
            }, [events, config.serving]);

            const { sets, games, points, currentServer, deuceState, isTiebreak } = useMemo(
                () => calculateScore(events, config, players, serveFirstPlayers, lastServersFromEvents, scoreModifiers.games, scoreModifiers.points, serveSecondPlayers, secondServer, getServerForGame),
                [events, config, players, serveFirstPlayers, lastServersFromEvents, scoreModifiers.games, scoreModifiers.points, serveSecondPlayers, secondServer, getServerForGame]
            );

            useEffect(() => {
                if (secondServer && players.length === 4) {
                    const firstServer = config.serving;
                    const firstServerPlayer = players.find(p => p.id === firstServer);
                    const secondServerPlayer = players.find(p => p.id === secondServer);
                    
                    if (!firstServerPlayer || !secondServerPlayer) return;
                    
                    const firstServerTeam = firstServerPlayer.team;
                    const secondServerTeam = secondServerPlayer.team;
                    
                    const firstServerPartner = players.find(p => p.team === firstServerTeam && p.id !== firstServer);
                    const secondServerPartner = players.find(p => p.team === secondServerTeam && p.id !== secondServer);
                    
                    if (!firstServerPartner || !secondServerPartner) return;
                    
                    const sequence = [firstServer, secondServer, firstServerPartner.id, secondServerPartner.id];
                    setServerSequence(sequence);
                }
            }, [secondServer, config.serving, players]);

            const prevSetsLengthRef = useRef(0);
            useEffect(() => {
                if (sets.length > prevSetsLengthRef.current) {
                    const lastSet = sets[sets.length - 1];
                    const t1SetsWon = sets.filter(s => s.t1 > s.t2).length + scoreModifiers.sets.t1;
                    const t2SetsWon = sets.filter(s => s.t2 > s.t1).length + scoreModifiers.sets.t2;
                    
                    if (lastSet.t1 > lastSet.t2) {
                        setSetWinner("t1");
                        if (t1SetsWon >= parseInt(config.sets)) setMatchWinner("t1");
                    } else if (lastSet.t2 > lastSet.t1) {
                        setSetWinner("t2");
                        if (t2SetsWon >= parseInt(config.sets)) setMatchWinner("t2");
                    }
                }
                prevSetsLengthRef.current = sets.length;
            }, [sets, scoreModifiers.sets, config.sets]);

            const prevGamesRef = useRef(null);
            useEffect(() => {
                const is66Now = games.t1 === 6 && games.t2 === 6;
                const was66Before = prevGamesRef.current && prevGamesRef.current.t1 === 6 && prevGamesRef.current.t2 === 6;
                
                if (is66Now && !was66Before && !tiebreakNotification) {
                    setTiebreakNotification(true);
                }
                
                prevGamesRef.current = { t1: games.t1, t2: games.t2 };
            }, [games, isTiebreak]);

            const btn = {
                borderRadius: 7, border: "1px solid rgba(255,255,255,0.08)",
                background: "rgba(255,255,255,0.04)", color: "#94a3b8", fontSize: 12,
                fontWeight: 700, cursor: "pointer", padding: "8px 6px", fontFamily: "inherit",
                letterSpacing: "0.03em"
            };

            const sel = (active, color = "#f59e0b") => active ? {
                borderColor: color, background: color + "22", color
            } : {};

            return (
                <div style={{
                    minHeight: "100vh", background: "#0a0f1a", fontFamily: "'Outfit', sans-serif",
                    color: "#f1f5f9", overflow: "hidden"
                }}>
                    <div style={{
                        background: "rgba(255,255,255,0.03)", borderBottom: "1px solid rgba(255,255,255,0.06)",
                        padding: "10px 16px", display: "flex", alignItems: "center", justifyContent: "space-between",
                        gap: 8, flexWrap: "wrap"
                    }}>
                        <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                            <button onClick={onSetupBack} style={{
                                background: "rgba(255,255,255,0.08)", border: "1px solid rgba(255,255,255,0.12)",
                                borderRadius: 6, color: "#e2e8f0", cursor: "pointer", fontSize: 12, padding: "6px 10px",
                                fontFamily: "inherit", fontWeight: 600
                            }}>
                                ← Setup
                            </button>
                            <span style={{ fontSize: 14, fontWeight: 900, letterSpacing: "-0.02em" }}>
                                PÁDEL<span style={{ color: "#f59e0b" }}>TRACK</span>
                            </span>
                        </div>

                        <div style={{
                            display: "flex", alignItems: "center", gap: 20, padding: "10px 16px",
                            background: "rgba(255,255,255,0.05)", borderRadius: 10,
                            border: "1px solid rgba(255,255,255,0.1)"
                        }}>
                            <div style={{ textAlign: "center", minWidth: 110 }}>
                                <div style={{
                                    fontSize: 9, color: "#f59e0b", fontWeight: 700, letterSpacing: "0.08em",
                                    marginBottom: 10
                                }}>
                                    {config.t1p1.split(" ")[0].toUpperCase()} / {config.t1p2.split(" ")[0].toUpperCase()}
                                </div>
                                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 12, alignItems: "center" }}>
                                    <div style={{ textAlign: "center" }}>
                                        <div style={{
                                            fontSize: 18, fontWeight: 900, color: "#f59e0b", lineHeight: 1
                                        }}>
                                            {Math.max(0, sets.filter(s => s.t1 > s.t2).length + scoreModifiers.sets.t1)}
                                        </div>
                                        <div style={{
                                            fontSize: 7, color: "#64748b", fontWeight: 800, marginTop: 4, letterSpacing: "0.1em"
                                        }}>
                                            SETS
                                        </div>
                                    </div>
                                    <div style={{ textAlign: "center" }}>
                                        <div style={{
                                            fontSize: 28, fontWeight: 900, color: "#f59e0b", lineHeight: 1
                                        }}>
                                            {games.t1}
                                        </div>
                                        <div style={{
                                            fontSize: 7, color: "#64748b", fontWeight: 800, marginTop: 4, letterSpacing: "0.1em"
                                        }}>
                                            GAMES
                                        </div>
                                    </div>
                                    <div style={{ textAlign: "center" }}>
                                        <div style={{
                                            fontSize: 28, fontWeight: 900,
                                            color: points.t1 === "AD" ? "#22c55e" : "#e2e8f0", lineHeight: 1
                                        }}>
                                            {points.t1}
                                        </div>
                                        <div style={{
                                            fontSize: 7, color: "#64748b", fontWeight: 800, marginTop: 4, letterSpacing: "0.1em"
                                        }}>
                                            PTS
                                        </div>
                                    </div>
                                </div>
                                <div style={{
                                    fontSize: 8, color: "#f59e0b", fontWeight: 700, marginTop: 12,
                                    letterSpacing: "0.1em"
                                }}>
                                    {isTiebreak ? "🎯 TIE-BREAK" : `SET ${sets.length + 1}`}
                                </div>
                            </div>

                            <div style={{
                                width: 1, height: 80, background: "rgba(255,255,255,0.15)"
                            }} />

                            <div style={{ textAlign: "center", minWidth: 110 }}>
                                <div style={{
                                    fontSize: 9, color: "#63b3ed", fontWeight: 700, letterSpacing: "0.08em",
                                    marginBottom: 10
                                }}>

        function calculateScore(events, config, players, serveFirstPlayers = {}, lastServers = {}, gamesModifier = { t1: 0, t2: 0 }, pointsModifier = { t1: 0, t2: 0 }, serveSecondPlayers = { t1: null, t2: null }, secondServer = null, getServerForGame = null) {
            const sets = [];
            
            let games = { 
                t1: Math.max(0, gamesModifier.t1),
                t2: Math.max(0, gamesModifier.t2)
            };
            
            const SCORE_SEQ = ["0", "15", "30", "40"];
            const getPointsFromModifier = (modifier) => {
                if (modifier >= 4) return "AD";
                return SCORE_SEQ[Math.min(3, Math.max(0, modifier))];
            };
            
            let points = { 
                t1: getPointsFromModifier(pointsModifier.t1), 
                t2: getPointsFromModifier(pointsModifier.t2) 
            };
            let currentServer = config.serving;
            let deuceState = null;
            let isTiebreak = false;

            function getNextServer() {
                if (secondServer && getServerForGame) {
                    const gameCount = games.t1 + games.t2 + 1;
                    return getServerForGame(gameCount);
                }
                
                const currentTeam = players.find(p => p.id === currentServer)?.team;
                const otherTeam = currentTeam === "t1" ? "t2" : "t1";
                
                const lastServer = lastServers[otherTeam];
                
                if (!lastServer) {
                    return serveFirstPlayers[otherTeam] || players.find(p => p.team === otherTeam)?.id;
                }

                if (lastServer === serveFirstPlayers[otherTeam]) {
                    return serveSecondPlayers[otherTeam] || players.filter(p => p.team === otherTeam).find(p => p.id !== serveFirstPlayers[otherTeam])?.id;
                }
                
                return serveFirstPlayers[otherTeam] || players.find(p => p.team === otherTeam)?.id;
            }

            function getNextServerInTiebreak() {
                const totalPoints = parseInt(points.t1) + parseInt(points.t2);
                
                const currentServerPlayer = players.find(p => p.id === currentServer);
                const currentTeam = currentServerPlayer?.team;
                const otherTeam = currentTeam === "t1" ? "t2" : "t1";
                
                const currentPartner = players.find(p => p.team === currentTeam && p.id !== currentServer)?.id;
                
                const otherTeamFirstServer = serveFirstPlayers[otherTeam] || players.find(p => p.team === otherTeam)?.id;
                
                const otherTeamPartner = players.find(p => p.team === otherTeam && p.id !== otherTeamFirstServer)?.id;
                
                const serverSequence = [currentServer, currentPartner, otherTeamFirstServer, otherTeamPartner];
                
                const sequenceIndex = Math.floor((totalPoints + 1) / 2) % 4;
                return serverSequence[sequenceIndex];
            }

            events.forEach((ev) => {
                const isPoint = ["Win", "ErrF", "FzaErr", "ErrNF"].includes(ev.result);
                if (!isPoint) return;

                if (ev.shot === "S1" && ev.result === "ErrNF") {
                    return;
                }

                const scored = ["Win", "FzaErr"].includes(ev.result) ? ev.team : (ev.team === "t1" ? "t2" : "t1");
                const conceded = scored === "t1" ? "t2" : "t1";

                if (games.t1 === 6 && games.t2 === 6) {
                    isTiebreak = true;
                    if (points.t1 !== "0" || points.t2 !== "0") {
                        points = { t1: "0", t2: "0" };
                    }
                }

                if (isTiebreak) {
                    const p1 = parseInt(points.t1) || 0;
                    const p2 = parseInt(points.t2) || 0;
                    
                    if (scored === "t1") {
                        points.t1 = String(p1 + 1);
                    } else {
                        points.t2 = String(p2 + 1);
                    }
                    
                    const newP1 = parseInt(points.t1);
                    const newP2 = parseInt(points.t2);
                    
                    currentServer = getNextServerInTiebreak();
                    
                    if ((newP1 >= 7 || newP2 >= 7) && Math.abs(newP1 - newP2) >= 2) {
                        games[scored]++;
                        sets.push({ t1: games.t1, t2: games.t2 });
                        games = { t1: 0, t2: 0 };
                        points = { t1: "0", t2: "0" };
                        isTiebreak = false;
                        deuceState = null;
                        currentServer = getNextServer();
                    }
                    return;
                }

                if (points[scored] === "40" && points[conceded] === "AD") {
                    points[conceded] = "40";
                } else if (points[scored] === "AD") {
                    games[scored]++;
                    points = { t1: "0", t2: "0" };
                    deuceState = null;

                    const shouldEndSet = (games[scored] >= 6 && games[conceded] <= 4) || (games[scored] >= 7 && games[scored] - games[conceded] >= 2);
                    const isSixSix = games.t1 === 6 && games.t2 === 6;
                    
                    if (shouldEndSet && !isSixSix) {
                        sets.push({ t1: games.t1, t2: games.t2 });
                        games = { t1: 0, t2: 0 };
                    }

                    currentServer = getNextServer();
                } else if (points[scored] === "40" && points[conceded] === "40") {
                    if (config.deuceRule === "goldenPoint") {
                        games[scored]++;
                        points = { t1: "0", t2: "0" };
                        deuceState = null;

                        const shouldEndSet = (games[scored] >= 6 && games[conceded] <= 4) || (games[scored] >= 7 && games[scored] - games[conceded] >= 2);
                        const isSixSix = games.t1 === 6 && games.t2 === 6;
                        
                        if (shouldEndSet && !isSixSix) {
                            sets.push({ t1: games.t1, t2: games.t2 });
                            games = { t1: 0, t2: 0 };
                        }

                        currentServer = getNextServer();
                    } else if (config.deuceRule === "advantage") {
                        points[scored] = "AD";
                        deuceState = scored === "t1" ? "AD T1" : "AD T2";
                    }
                } else if (points[scored] === "40" && points[conceded] !== "40" && points[conceded] !== "AD") {
                    games[scored]++;
                    points = { t1: "0", t2: "0" };
                    deuceState = null;

                    const shouldEndSet = (games[scored] >= 6 && games[conceded] <= 4) || (games[scored] >= 7 && games[scored] - games[conceded] >= 2);
                    const isSixSix = games.t1 === 6 && games.t2 === 6;
                    
                    if (shouldEndSet && !isSixSix) {
                        sets.push({ t1: games.t1, t2: games.t2 });
                        games = { t1: 0, t2: 0 };
                    }

                    currentServer = getNextServer();
                } else {
                    points[scored] = nextScore(points[scored]);
                }
            });

            return { sets, games, points, currentServer, deuceState, isTiebreak };
        }

        export default function App() {
            const [screen, setScreen] = useState("setup");
            const [config, setConfig] = useState(null);
            const [events, setEvents] = useState([]);

            function handleStart(cfg) {
                setConfig(cfg);
                setEvents([]);
                setScreen("tracker");
            }

            function handleAddEvent(ev) {
                setEvents(prev => [...prev, ev]);
            }

            function handleUndo() {
                setEvents(prev => prev.slice(0, -1));
            }

            if (screen === "setup") return <SetupScreen onStart={handleStart} />;
            if (screen === "tracker")
                return (
                    <TrackerScreen
                        config={config}
                        events={events}
                        onAddEvent={handleAddEvent}
                        onUndo={handleUndo}
                        onDeleteEvent={() => {}}
                        onFinish={() => setScreen("stats")}
                        onSetupBack={() => setScreen("setup")}
                    />
                );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
